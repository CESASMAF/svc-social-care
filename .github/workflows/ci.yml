name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Build and tests
    runs-on: ubuntu-22.04
    # Roda na MESMA imagem do Dockerfile/produção (swift:6.3-jammy). Antes o job
    # usava setup-swift fixado em 6.2 (resolvia 6.2.1), divergente do repo já em
    # 6.3 (tools-version, .swift-version 6.3.2, Dockerfile swift:6.3-jammy) — esse
    # descasamento de toolchain mascarava o comportamento real de produção e
    # causava "passa local (macOS 6.3) / falha no CI (Linux 6.2.1)".
    container: swift:6.3-jammy
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test

  sbom:
    name: SBOM
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    uses: acdgbrasil/.github/.github/workflows/reusable-sbom.yml@main
    permissions:
      contents: write

  kodus-review:
    name: Kodus AI Review
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    uses: acdgbrasil/.github/.github/workflows/reusable-kodus-review.yml@main
    with:
      fail_on: critical
    secrets:
      KODUS_TEAM_KEY: ${{ secrets.KODUS_TEAM_KEY }}
